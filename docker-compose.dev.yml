services:
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/backend.Dockerfile
      target: builder
    command: ["go", "run", "./cmd/server"]
    volumes:
      - ./backend:/src
    environment:
      - GO_ENV=development

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
